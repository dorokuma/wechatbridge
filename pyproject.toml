[project]
name = "wechatbridge"
version = "1.0.3"
description = "Bridge WeChat messages to agy CLI — text/image/file/voice in, agy replies and generated files back."
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "WeChatBridge contributors" },
]
dependencies = [
    "httpx",
    "qrcode",
    "Pillow",
    "cryptography",
]

[project.scripts]
wechatbridge = "wechatbridge.main:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["wechatbridge"]
